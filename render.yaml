services:
  - type: web
    name: intelli-cash-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run db:generate && npm run build:api
    startCommand: npm run start:api
    initialDeployHook: npm run db:seed:env -w @intellicash/api
    healthCheckPath: /health
    disk:
      name: intellicash-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/intellicash.db
      - key: API_PUBLIC_URL
        value: https://intelli-cash-api.onrender.com
      - key: WEB_ORIGIN
        value: https://intelli-cash.onrender.com,https://intellicash-web.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOW_SANDBOX_NETWORK_TESTS
        value: false
      - key: ENABLE_PAYMENT_NETWORK_CALLS
        value: false
      - key: INTELLIAUDIT_LLM_PROVIDER
        value: disabled
      - key: INTELLIAUDIT_LLM_BASE_URL
        sync: false
      - key: INTELLIAUDIT_LLM_API_KEY
        sync: false
      - key: INTELLIAUDIT_LLM_MODEL
        sync: false
      - key: INTELLIAUDIT_ENABLE_CONNECTOR_NETWORK_CALLS
        value: false
      - key: GOOGLE_MAPS_BROWSER_API_KEY
        sync: false
      - key: AFRICASTALKING_USERNAME
        sync: false
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: AFRICASTALKING_SENDER_ID
        sync: false
      - key: BONGA_SMS_CLIENT_ID
        sync: false
      - key: BONGA_SMS_API_KEY
        sync: false
      - key: BONGA_SMS_API_SECRET
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://intelli-cash-api.onrender.com/api/v1/payments/mpesa/stk-callback
      - key: MPESA_INITIATOR_NAME
        sync: false
      - key: MPESA_SECURITY_CREDENTIAL
        sync: false
      - key: MPESA_B2C_RESULT_URL
        value: https://intelli-cash-api.onrender.com/api/v1/payments/mpesa/b2c-result
      - key: MPESA_B2C_TIMEOUT_URL
        value: https://intelli-cash-api.onrender.com/api/v1/payments/mpesa/b2c-timeout
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: IPRS_BASE_URL
        sync: false
      - key: IPRS_CLIENT_ID
        sync: false
      - key: IPRS_CLIENT_SECRET
        sync: false
      - key: KCB_BUNI_BASE_URL
        sync: false
      - key: KCB_BUNI_CLIENT_ID
        sync: false
      - key: KCB_BUNI_CLIENT_SECRET
        sync: false
      - key: KCB_BUNI_CALLBACK_URL
        value: https://intelli-cash-api.onrender.com/api/v1/integrations/kcb-buni/callback
      - key: TRANSUNION_BASE_URL
        sync: false
      - key: TRANSUNION_CLIENT_ID
        sync: false
      - key: TRANSUNION_CLIENT_SECRET
        sync: false
      - key: MFARM_BASE_URL
        sync: false
      - key: MFARM_API_KEY
        sync: false

  - type: web
    name: intelli-cash
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:web
    startCommand: npm run start:web
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://intelli-cash-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
